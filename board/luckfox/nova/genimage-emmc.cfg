image emmc.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition u-boot {
		in-partition-table = false
		image = "u-boot-rockchip.bin"
		offset = 32K
	}

	partition rootfs {
		partition-type-uuid = "b921b045-1df0-41c3-af44-4c6f280d3fae"
		# eMMC PARTUUID - distinct from the SD image so both can coexist.
		# Must match root= in the patched extlinux.conf (see post-image.sh).
		partition-uuid = "d3a8f2b6-4c71-4e2a-9b58-2f90c1d4e302"
		image = "rootfs-emmc.ext4"
		offset = 16M
		bootable = true
	}
}
