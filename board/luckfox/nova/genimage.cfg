image sdcard.img {
	hdimage {
		partition-table-type = "gpt"
	}

	# TPL/SPL + u-boot.itb combined image at the Rockchip 32KiB offset,
	# outside the partition table (fits in the 16MiB gap before rootfs).
	partition u-boot {
		in-partition-table = false
		image = "u-boot-rockchip.bin"
		offset = 32K
	}

	partition rootfs {
		partition-type-uuid = "b921b045-1df0-41c3-af44-4c6f280d3fae"
		# Fixed PARTUUID, must match root= in extlinux.conf
		partition-uuid = "8b3258a1-71e1-4f60-9f4a-6ab0c5a4e301"
		image = "rootfs.ext4"
		offset = 16M
		bootable = true
	}
}
