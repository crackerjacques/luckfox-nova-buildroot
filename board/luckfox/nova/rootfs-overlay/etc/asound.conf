# The on-board mic sits on channel 8 of the codec's 8-channel ADC.
# "mic" captures just that channel as mono, with format/rate conversion:
#
#   arecord -D mic -r 48000 -f S16_LE -c 1 -d 5 /tmp/t.wav
#
# Note: raw hw:0,0 S24_LE is MSB-justified on this silicon (reads 1/256
# low); the plug layer here always runs the hardware as S32_LE instead.
pcm.mic {
	type plug
	slave {
		pcm "hw:0,0"
		channels 8
		format S32_LE
	}
	ttable.0.7 1
}
